name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 缓存SDK/NDK，大幅减少重复下载时间
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: buildozer-full-v2

      # 安装全部系统依赖
      - name: Install system deps
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libsqlite3-dev bzip2 libffi-dev build-essential wget curl

      # 安装最新buildozer + python-for-android
      - name: Install buildozer & p4a
        run: |
          python3 -m pip install --upgrade pip setuptools wheel cython
          pip3 install buildozer python-for-android --upgrade

      # 预初始化，手动拉取p4a源码、安装build-tools、同意协议
      - name: Pre init SDK and p4a
        run: |
          buildozer android clean
          # 强制初始化SDK框架，生成目录结构
          buildozer android debug || true
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          P4A_ROOT="$HOME/.buildozer/android/platform/python-for-android"
          # 如果p4a目录不存在，手动git拉取
          if [ ! -d "$P4A_ROOT" ]; then
            git clone https://github.com/kivy/python-for-android.git "$P4A_ROOT"
          fi
          # 安装对应版本build-tools
          echo "y" | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"
          echo "y" | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      # 正式编译release包
      - name: Build release APK
        run: buildozer android release

      # 上传APK文件
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk