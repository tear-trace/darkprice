name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    env:
      ANDROID_HOME: /home/user/.buildozer/android/platform/android-sdk
      BUILDOZER_ROOT_WARNING: "yes"
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 缓存 .buildozer
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-${{ github.run_id }}

      - name: 清理并构建 release APK
        run: |
          echo "y" | buildozer android clean
          rm -rf ./.buildozer/android/platform/build-*
          find ./.buildozer/android/platform -name ".built" -delete 2>/dev/null || true
          rm -rf ./.buildozer/android/platform/build-arm64-v8a/dists/darkprice
          echo "y" | buildozer android release --no-interactive

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk