name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 缓存编译环境，复用SDK/NDK/p4a，大幅提速
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-docker-v5

      # 预先拉取python-for-android源码，消除目录找不到报错
      - name: Pre-clone p4a source
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          [ ! -d "$P4A" ] && git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"

      # 直接打包Release，Docker镜像预装完整SDK+已全部同意Google许可
      - name: Build Release APK
        run: buildozer android release

      # 上传APK产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk