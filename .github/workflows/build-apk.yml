name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    env:
      ANDROID_HOME: /github/home/.buildozer/android/platform/android-sdk
      SDKMANAGER_OPTS: "--licenses=yes"
      BUILDOZER_ROOT_WARNING: "yes"
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 缓存SDK、NDK、p4a源码，复用环境
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-p4a-setup-fix-v10

      # 预拉取p4a源码 + 通过setup安装全部依赖，修复appdirs缺失、无requirements.txt报错
      - name: Pre clone p4a & install dependencies
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          if [ ! -d "$P4A" ]; then
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"
          fi
          cd "$P4A"
          # --no-cache-dir 解决pip目录权限警告，用setup安装所有依赖
          pip3 install --no-cache-dir .

      # 清理 + 初始化SDK，全部管道自动应答root确认
      - name: Silent clean & init SDK
        run: |
          echo "y" | buildozer android clean
          echo "y" | buildozer android debug || true
          SDK_DIR=$ANDROID_HOME
          # 批量同意SDK许可，安装固定33.0.2编译工具
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses

      # 静默打包Release
      - name: Build release APK
        run: echo "y" | buildozer android release --no-interactive

      # 上传APK工件
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk