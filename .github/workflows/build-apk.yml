name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 缓存本地.buildozer（当前项目目录，不是家目录）
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-local-v3

      # 安装系统依赖
      - name: Install system packages
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libsqlite3-dev bzip2 libffi-dev build-essential wget curl

      # 安装打包依赖
      - name: Install buildozer & p4a
        run: |
          python3 -m pip install --upgrade pip setuptools wheel cython
          pip3 install buildozer python-for-android --upgrade

      # ========== 核心修复：先手动克隆p4a到项目本地.buildozer，再初始化SDK ==========
      - name: 预先拉取 python-for-android 源码
        run: |
          P4A_LOCAL=./.buildozer/android/platform/python-for-android
          mkdir -p ./buildozer/android/platform
          if [ ! -d "$P4A_LOCAL" ]; then
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A_LOCAL"
          fi
          # 初始化SDK并安装编译工具
          buildozer android clean
          SDK_ROOT=./.buildozer/android/platform/android-sdk
          # 仅当sdkmanager存在时执行安装
          if [ -f "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "y" | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"
            echo "y" | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          fi

      # 正式打包Release
      - name: Build Release APK
        run: buildozer android release

      # 上传安装包
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk