name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      BUILDOZER_ROOT_WARNING: "yes"
    steps:
      - name: 쇱놔꾑욋덜쯤
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libffi-dev libssl-dev cmake \
            autoconf-archive
          pip install buildozer cython==0.29.33

      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-${{ github.run_id }}

      - name: Pre clone p4a, force hostpython3 version and fix python3 grp module
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          if [ ! -d "$P4A" ]; then
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"
          fi
          cd "$P4A"
          pip install --no-cache-dir .
          # 퓻齡 hostpython3 recipe 賈痰 3.12.7
          sed -i 's/version = ".*"/version = "3.12.7"/g' pythonforandroid/recipes/hostpython3/__init__.py
          # 錦릿 python3 recipe: 쐐痰 grp 친욥긍陋 (Android NDK 꼇連넣)
          python3 -c "
          import re
          path = 'pythonforandroid/recipes/python3/__init__.py'
          with open(path, 'r') as f:
              content = f.read()
          content = content.replace(
              'env = self.get_recipe_env(arch)',
              \"env = self.get_recipe_env(arch)\n        env['ac_cv_func_setgrent'] = 'no'\n        env['ac_cv_func_getgrent'] = 'no'\n        env['ac_cv_func_endgrent'] = 'no'\"
          )
          with open(path, 'w') as f:
              f.write(content)
          "

      - name: Full clean before build
        run: |
          echo "y" | buildozer android clean
          rm -rf ./.buildozer/android/platform/build-*
          rm -rf ./.buildozer/android/platform/packages/Python-*
          rm -rf ./.buildozer/android/platform/packages/hostpython3
          find ./.buildozer/android/platform -name ".built" -delete 2>/dev/null || true
          rm -rf ./.buildozer/android/platform/build/other_builds/python3
          rm -rf ./.buildozer/android/platform/build/other_builds/hostpython3
          rm -rf ./.buildozer/android/platform/build-arm64-v8a/dists/darkprice

      - name: Build release APK
        run: |
          find ./.buildozer/android/platform -name ".built" -delete 2>/dev/null || true
          rm -rf ./.buildozer/android/platform/build/other_builds/python3
          rm -rf ./.buildozer/android/platform/build-arm64-v8a/dists/darkprice
          echo "y" | buildozer android release --no-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk