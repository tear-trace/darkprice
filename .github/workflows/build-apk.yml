name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    env:
      ANDROID_HOME: /github/home/.buildozer/android/platform/android-sdk
      SDKMANAGER_OPTS: "--licenses=yes"
      BUILDOZER_ROOT_WARNING: "yes"
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 缓存SDK、NDK、p4a源码
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-full-silent-v8

      # 预拉取python-for-android源码
      - name: Pre clone p4a
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          [ ! -d "$P4A" ] && git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"

      # 全部buildozer命令统一加echo y | 自动应答root确认
      - name: 静默清理+初始化SDK
        run: |
          # 清理：管道自动应答root弹窗
          echo "y" | buildozer android clean
          # 初始化SDK框架，同样自动确认root
          echo "y" | buildozer android debug || true
          SDK_DIR=$ANDROID_HOME
          # 批量同意所有SDK许可，安装锁定版本build-tools
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses

      # 打包Release，自动应答root确认
      - name: 编译APK
        run: echo "y" | buildozer android release --no-interactive

      # 上传APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk