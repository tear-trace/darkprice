name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    env:
      ANDROID_HOME: /github/home/.buildozer/android/platform/android-sdk
      # 删除错误参数 SDKMANAGER_OPTS="--licenses=yes"
      BUILDOZER_ROOT_WARNING: "yes"
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 缓存完整编译环境
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-fix-sdkopt-v11

      # 预拉取p4a源码并安装依赖，修复appdirs缺失
      - name: Pre clone p4a & install dependencies
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          if [ ! -d "$P4A" ]; then
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"
          fi
          cd "$P4A"
          pip3 install --no-cache-dir .

      # 全部buildozer命令管道自动应答root弹窗，不再手动调用sdkmanager
      - name: 清理并完整初始化SDK（交给buildozer自动处理许可）
        run: |
          echo "y" | buildozer android clean
          echo "y" | buildozer android debug --no-interactive || true

      # 静默打包Release
      - name: Build release APK
        run: echo "y" | buildozer android release --no-interactive

      # 上传APK产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk