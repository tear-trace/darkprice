name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    env:
      ANDROID_HOME: /github/home/.buildozer/android/platform/android-sdk
      BUILDOZER_ROOT_WARNING: "yes"
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 缓存编译环境
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-fix-thorvg-v13

      # 预拉取p4a并安装依赖
      - name: Pre clone p4a & install dependencies
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          if [ ! -d "$P4A" ]; then
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"
          fi
          cd "$P4A"
          pip3 install --no-cache-dir .

      # 彻底清理旧构建产物（关键：删除之前thorvg失败的缓存）
      - name: Full clean build cache
        run: |
          echo "y" | buildozer android clean
          rm -rf ./.buildozer/android/platform/build-*

      # 初始化SDK
      - name: Init SDK
        run: echo "y" | buildozer android debug --no-interactive || true

      # 打包Release
      - name: Build release APK
        run: echo "y" | buildozer android release --no-interactive

      # 上传APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk