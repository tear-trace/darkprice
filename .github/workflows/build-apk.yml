name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      BUILDOZER_ROOT_WARNING: "yes"
    steps:
      - name: МьГіВжПтДњТы
        uses: actions/checkout@v4

      - name: АВзА Python 3.12ЃЈгУгкдЫаа BuildozerЃЉ
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: АВзАЯЕЭГвРРЕ
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libffi-dev libssl-dev cmake \
            autoconf-archive
          pip install buildozer cython==0.29.33

      - name: ЛКДц .buildozer ФПТМ
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-${{ github.run_id }}

      - name: ПЫТЁ p4a ВЂЧПжЦ hostpython3 АцБОЮЊ 3.10.13ЃЌНћгУ grp ФЃПщ
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          if [ ! -d "$P4A" ]; then
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"
          fi
          cd "$P4A"
          pip install --no-cache-dir .
          # ЧПжЦ hostpython3 АцБО
          sed -i 's/version = ".*"/version = "3.10.13"/g' pythonforandroid/recipes/hostpython3/__init__.py
          # аоИФ python3 recipeЃЌНћгУ grp ФЃПщБрвы
          python3 -c "
          import re
          path = 'pythonforandroid/recipes/python3/__init__.py'
          with open(path, 'r') as f:
              content = f.read()
          content = content.replace(
              'env = self.get_recipe_env(arch)',
              'env = self.get_recipe_env(arch)\n        env[\"py_cv_module_grp\"] = \"n/a\"'
          )
          with open(path, 'w') as f:
              f.write(content)
          "

      - name: ГЙЕзЧхРэОЩЕФЙЙНЈВњЮя
        run: |
          echo "y" | buildozer android clean
          rm -rf ./.buildozer/android/platform/build-*
          rm -rf ./.buildozer/android/platform/packages/Python-*
          rm -rf ./.buildozer/android/platform/packages/hostpython3
          find ./.buildozer/android/platform -name ".built" -delete 2>/dev/null || true
          rm -rf ./.buildozer/android/platform/build/other_builds/python3
          rm -rf ./.buildozer/android/platform/build/other_builds/hostpython3
          rm -rf ./.buildozer/android/platform/build-arm64-v8a/dists/darkprice

      - name: ЙЙНЈ release APK
        run: |
          find ./.buildozer/android/platform -name ".built" -delete 2>/dev/null || true
          rm -rf ./.buildozer/android/platform/build/other_builds/python3
          rm -rf ./.buildozer/android/platform/build-arm64-v8a/dists/darkprice
          echo "y" | buildozer android release --no-interactive

      - name: ЩЯДЋ APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk