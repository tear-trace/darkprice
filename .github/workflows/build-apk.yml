name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      BUILDOZER_ROOT_WARNING: "yes"
      ACLOCAL_PATH: /usr/share/aclocal   # 保留以防其他组件需要
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libffi-dev libssl-dev cmake \
            autoconf-archive
          pip install buildozer cython==0.29.33

      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: ./.buildozer
          key: buildozer-v19-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Pre clone p4a and fix libffi
        run: |
          mkdir -p ./.buildozer/android/platform
          P4A=./.buildozer/android/platform/python-for-android
          if [ ! -d "$P4A" ]; then
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A"
          fi
          cd "$P4A"
          pip install --no-cache-dir .
          # 强制 hostpython3 版本
          sed -i 's/version = ".*"/version = "3.12.7"/g' pythonforandroid/recipes/hostpython3/__init__.py
          # 注释掉 libffi recipe 中的 autoreconf，避免 Ubuntu 24.04 的 autoconf 报错
          sed -i "s/        shprint(sh.Command('autoreconf'), '-vif', _env=env)/        # shprint(sh.Command('autoreconf'), '-vif', _env=env)/" pythonforandroid/recipes/libffi/__init__.py
          # 删除已下载的 Python 源码包，强迫重新下载
          rm -rf ${{ github.workspace }}/.buildozer/android/platform/packages/Python-*

      - name: Full clean build cache
        run: |
          echo "y" | buildozer android clean
          rm -rf ./.buildozer/android/platform/build-*

      - name: Init SDK
        run: echo "y" | buildozer android debug --no-interactive || true

      - name: Build release APK
        run: echo "y" | buildozer android release --no-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarkPrice-APK
          path: bin/*.apk